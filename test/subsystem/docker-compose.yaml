services:
  postgres:
    image: docker.io/library/postgres:17
    environment:
      POSTGRES_DB: placement-manager
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpass
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d placement-manager"]
      interval: 2s
      timeout: 5s
      retries: 10

  policy-manager:
    image: docker.io/wiremock/wiremock:3x
    ports:
      - "28081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/mappings"]
      interval: 2s
      timeout: 5s
      retries: 10

  sp-resource-manager:
    image: docker.io/wiremock/wiremock:3x
    ports:
      - "28082:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/mappings"]
      interval: 2s
      timeout: 5s
      retries: 10

  placement-manager:
    build:
      context: ../..
      dockerfile: Containerfile
    environment:
      SVC_ADDRESS: "0.0.0.0:8080"
      DB_TYPE: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: placement-manager
      DB_USER: admin
      DB_PASSWORD: adminpass
      POLICY_MANAGER_EVALUATION_URL: "http://policy-manager:8080"
      SP_RESOURCE_MANAGER_URL: "http://sp-resource-manager:8080"
    ports:
      - "28080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      policy-manager:
        condition: service_healthy
      sp-resource-manager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1alpha1/health"]
      interval: 2s
      timeout: 5s
      retries: 15
